<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel 3D Interactivo</title>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CONTENEDOR */
.slider{
position:relative;
width:600px;
height:400px;
transform-style: preserve-3d;
transform: perspective(1000px);
}

/* IMÁGENES */
.slide{
position:absolute;
width:220px;
height:300px;
left:50%;
top:50%;
margin:-150px -110px;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
cursor:pointer;
transition: transform 0.5s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="slider" id="slider">

<div class="slide"><img src="images?1"></div>
<div class="slide"><img src="images?2"></div>
<div class="slide"><img src="images?3"></div>
<div class="slide"><img src="images?4"></div>
<div class="slide"><img src="images?5"></div>

</div>

<script>

const slides = document.querySelectorAll(".slide");
const slider = document.getElementById("slider");

let angle = 0;
let targetAngle = 0;

const total = slides.length;
const step = 360 / total;

/* POSICIONAR EN CÍRCULO */
slides.forEach((slide, i)=>{
slide.dataset.index = i;
slide.style.transform = `rotateY(${i * step}deg) translateZ(350px)`;

/* CLICK → TRAER AL FRENTE */
slide.addEventListener("click", ()=>{
targetAngle = -i * step;
});
});

/* MOVIMIENTO CON MOUSE */
document.addEventListener("mousemove", (e)=>{
const centerX = window.innerWidth / 2;
let diff = (e.clientX - centerX) / 50;
targetAngle += diff * 0.2; // movimiento suave acumulativo
});

/* ANIMACIÓN SUAVE */
function animate(){
angle += (targetAngle - angle) * 0.05;
slider.style.transform = `perspective(1000px) rotateY(${angle}deg)`;
requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
