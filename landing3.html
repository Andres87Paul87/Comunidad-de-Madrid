<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Entrada</title>

<style>
body {
  margin: 0;
  background: #000;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* Contenedor */
.contenedor {
  text-align: center;
}

/* Imagen */
.imagen {
  width: 220px;
  height: 300px;
  border-radius: 12px;
  overflow: hidden;
  border: 6px solid gold;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
  margin-bottom: 40px;
  transition: 0.3s;
}

.imagen:hover {
  transform: scale(1.05);
}

/* Botón */
.boton {
  display: inline-block;
  padding: 16px 40px;
  font-size: 18px;
  color: #fff;
  background: linear-gradient(45deg,#ffcc00,#ff9900);
  border-radius: 30px;
  box-shadow: 0 0 15px rgba(255,165,0,0.7);
  transition: 0.3s;
}

.boton:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="contenedor">

  <!-- TODO clickeable -->
  <a href="https://sites.google.com/view/eebf-comunidad-de-madrid/inicio"
     target="_top"
     style="text-decoration:none;">

    <div class="imagen">
      <img src="images/Sello.jpg"
           style="width:100%; height:100%; object-fit:cover;">
    </div>

    <div class="boton">
      Entrar
    </div>

  </a>

</div>

</body>
</html>
