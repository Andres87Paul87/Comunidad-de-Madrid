<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escudo Giratorio</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  font-family: Arial, sans-serif;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Escudo */
.contenedor {
  perspective: 1200px;
  margin-bottom: 30px;
}

.moneda {
  width: 220px;
  height: 300px;
  position: relative;
  transform-style: preserve-3d;
  animation: girar 7s linear infinite;
}

.cara {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
  border: 6px solid gold;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

.cara img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.trasera {
  transform: rotateY(180deg);
}

@keyframes girar {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}


.boton:hover {
  transform: scale(1.08);
}

.boton:active {
  transform: scale(0.92);
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- Escudo -->
  <div class="contenedor">
    <div class="moneda">
      <div class="cara frontal">
        <img src="images/Sello.jpg">
      </div>
      <div class="cara trasera">
        <img src="images/Sello.jpg">
      </div>
    </div>
  </div>


  </div>

</div>



</body>
</html>
