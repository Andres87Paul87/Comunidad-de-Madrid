<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escuela Educación Básica Fiscal "Comunidad de Madrid"</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #000;
  font-family: Arial, sans-serif;
}

/* Contenedor 3D */
.contenedor {
  perspective: 1200px;
  margin-bottom: 40px;
}

/* Moneda */
.moneda {
  width: 220px;
  height: 300px;
  position: relative;
  transform-style: preserve-3d;
  animation: girar 7s linear infinite;
}

/* Caras */
.cara {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
  border: 6px solid gold;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

.cara img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.trasera {
  transform: rotateY(180deg);
}

/* Animación */
@keyframes girar {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* 🔘 Botón MÁS PEQUEÑO */
.boton {
  padding: 10px 22px; /* 🔽 reducido */
  font-size: 14px;    /* 🔽 reducido */
  color: white;
  background: linear-gradient(45deg,#ffcc00,#ff9900);
  border-radius: 25px;
  box-shadow: 0 0 10px rgba(255,165,0,0.6);
  transition: 0.3s;
}

.boton:hover {
  transform: scale(1.08);
}
</style>
</head>

<body>

<a href="https://sites.google.com/view/eebf-comunidad-de-madrid/inicio"
   target="_top"
   style="text-decoration:none; text-align:center;">

  <div class="contenedor">
    <div class="moneda">

      <div class="cara frontal">
        <img src="images/Sello.jpg">
      </div>

      <div class="cara trasera">
        <img src="images/Sello.jpg">
      </div>

    </div>
  </div>

  <div class="boton">
    Entrar
  </div>

</a>

</body>
</html>
