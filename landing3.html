<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escudo Giratorio</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  font-family: Arial, sans-serif;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Escudo */
.contenedor {
  perspective: 1200px;
  margin-bottom: 30px;
}

.moneda {
  width: 220px;
  height: 300px;
  position: relative;
  transform-style: preserve-3d;
  animation: girar 7s linear infinite;
}

.cara {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
  border: 6px solid gold;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

.cara img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.trasera {
  transform: rotateY(180deg);
}

@keyframes girar {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* Botón */
.boton {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  font-size: 14px;
  color: white;
  background: linear-gradient(45deg,#ffcc00,#ff9900);
  border-radius: 25px;
  box-shadow: 0 0 10px rgba(255,165,0,0.6);
  cursor: pointer;
  transition: 0.2s;
}

.boton:hover {
  transform: scale(1.08);
}

.boton:active {
  transform: scale(0.92);
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- Escudo -->
  <div class="contenedor">
    <div class="moneda">
      <div class="cara frontal">
        <img src="images/Sello.jpg">
      </div>
      <div class="cara trasera">
        <img src="images/Sello.jpg">
      </div>
    </div>
  </div>

  <!-- Botón -->
  <div class="boton" onclick="abrir()">
    🔗 Entrar
  </div>

</div>

<script>
function abrir() {
  const url = "https://sites.google.com/view/eebf-comunidad-de-madrid/inicio";

  // 🔥 intentos para salir del visor
  window.location.href = url;
  window.top.location.href = url;
  window.parent.location.href = url;

  // respaldo
  setTimeout(() => {
    window.open(url, "_top");
  }, 200);
}
</script>

</body>
</html>
