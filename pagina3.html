<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rotulación con títulos</title>
<style>
  .contenedor {
    position: relative;
    display: inline-block;
  }

  .contenedor img {
    width: 100%;
    max-width: 900px;
  }

  .etiqueta {
    position: absolute;
    background-color: rgba(0, 0, 255, 0.7);
    color: white;
    padding: 5px;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
  }

  /* Posiciones de ejemplo */
  .pc1 { top: 70%; left: 10%; }
  .pc2 { top: 65%; left: 25%; }
  .pc3 { top: 60%; left: 40%; }
  .pc4 { top: 65%; left: 60%; }
  .pc5 { top: 70%; left: 80%; }

</style>
</head>
<body>

<h2>Laboratorio de Computación</h2>

<div class="contenedor">
  <img src="images/laboratorio.jpg" alt="Laboratorio">

  <div class="etiqueta pc1" title="PC 1 - Intel i5, 8GB RAM">PC 1</div>
  <div class="etiqueta pc2" title="PC 2 - Intel i3, 4GB RAM">PC 2</div>
  <div class="etiqueta pc3" title="PC 3 - AMD Ryzen 5, 8GB RAM">PC 3</div>
  <div class="etiqueta pc4" title="PC 4 - Intel i7, 16GB RAM">PC 4</div>
  <div class="etiqueta pc5" title="PC 5 - Intel i5, 8GB RAM">PC 5</div>
</div>

</body>
</html>
