<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rotulación de Computadoras</title>
<style>
  .contenedor {
    position: relative;
    display: inline-block;
  }

  .contenedor img {
    width: 100%;
    max-width: 900px;
  }

  .etiqueta {
    position: absolute;
    background-color: rgba(255, 0, 0, 0.7);
    color: white;
    padding: 5px;
    border-radius: 5px;
    font-size: 14px;
  }

  /* Ejemplos de posiciones */
  .pc1 { top: 70%; left: 10%; }
  .pc2 { top: 65%; left: 25%; }
  .pc3 { top: 60%; left: 40%; }
  .pc4 { top: 65%; left: 60%; }
  .pc5 { top: 70%; left: 80%; }

</style>
</head>
<body>

<h2>Laboratorio de Computación</h2>

<div class="contenedor">
  <img src="images/laboratorio.jpeg" alt="Laboratorio">

  <div class="etiqueta pc1">PC 1</div>
  <div class="etiqueta pc2">PC 2</div>
  <div class="etiqueta pc3">PC 3</div>
  <div class="etiqueta pc4">PC 4</div>
  <div class="etiqueta pc5">PC 5</div>
</div>

</body>
</html>
