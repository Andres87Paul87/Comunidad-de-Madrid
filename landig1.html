<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escudo Giratorio Elegante</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

.contenedor {
  perspective: 1200px;
}

.moneda {
  width: 320px;
  height: 420px;
  position: relative;
  transform-style: preserve-3d;
  transform: scale(0.75);
  animation: girar 7s infinite linear;
}

.cara {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;

  border: 8px solid;
  border-image: linear-gradient(45deg, gold, #ffd700, #b8860b, gold) 1;

  box-shadow: 0 0 25px rgba(255,215,0,0.7);
}

.cara img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.trasera {
  transform: rotateY(180deg);
}

@keyframes girar {
  0% { transform: rotateY(0deg) scale(0.75); }
  100% { transform: rotateY(360deg) scale(0.75); }
}

.brillo {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;

  background: linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.8) 50%,
    transparent 70%
  );

  mix-blend-mode: screen;
  opacity: 0.7;

  animation: destello 3s infinite;
}

@keyframes destello {
  0% {
    transform: translateX(-100%) skewX(-20deg);
  }
  100% {
    transform: translateX(200%) skewX(-20deg);
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="miAudio" src="sonido/Himno.mp3"></audio>

<div class="contenedor">
  <div class="moneda">

    <div class="cara frontal">
      <img src="images/Sello.jpg">
      <div class="brillo"></div>
    </div>

    <div class="cara trasera">
      <img src="images/Sello.jpg">
      <div class="brillo"></div>
    </div>

  </div>
</div>

<script>
// Reproducir audio al cargar
window.addEventListener("load", () => {
  const audio = document.getElementById("miAudio");

  // Intentar reproducir
  audio.play().catch(() => {
    console.log("El navegador bloqueó el autoplay");
  });

  // Redirigir después de 4 segundos
  setTimeout(() => {
    window.location.href = "https://sites.google.com/view/eebf-comunidad-de-madrid/inicio";
  }, 4000);
});
</script>

</body>
</html>
