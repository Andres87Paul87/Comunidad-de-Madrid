
<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Laboratorio de Computación</title>

<style>
* {
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: Arial, sans-serif;
  background: #e0e0e0;
  text-align: center;
}

.marco {
  display: inline-block;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
  overflow: visible;
}

.pizarra {
  margin: 0 auto 30px auto;
  width: 500px;
  height: 120px;
  background: #2d572c;
  border: 8px solid #8b5a2b;
  border-radius: 8px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
}

.lab {
  display: grid;
  grid-template-columns: repeat(3, 120px) 80px repeat(2, 120px);
  gap: 20px;
  justify-content: center;
}

.pc {
  width: 120px;
  height: 90px;
  position: relative;
  cursor: pointer;
  outline: none;
}

.pc img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.pc:focus,
.pc:active,
.pc:focus-visible {
  outline: none !important;
  box-shadow: none !important;
}

.pc::after {
  content: attr(data-info);
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 8px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: 0.3s;
  white-space: pre-line;
  text-align: left;
  z-index: 999;
}

.pc:hover::after {
  opacity: 1;
}
</style>
</head>

<body>

<h2>Laboratorio de Computación</h2>

<div class="marco">
<div class="pizarra">PIZARRA</div>

<div class="lab">
