<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel 3D Interactivo</title>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CONTENEDOR */
.slider{
position:relative;
width:80vw;
height:50vh;
transform-style: preserve-3d;
transform: perspective(1000px);
}

/* IMÁGENES */
.slide{
position:absolute;
width:30vw;
height:40vh;
max-width:220px;
max-height:300px;
left:50%;
top:50%;
transform: translate(-50%, -50%);
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
cursor:pointer;
transition: transform 0.5s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* 📱 AJUSTE PARA TELÉFONOS */
@media (max-width: 600px){

.slider{
width:100vw;
height:60vh;
}

.slide{
width:45vw;
height:55vw;
}

}

</style>
</head>

<body>

<div class="slider" id="slider">

<div class="slide"><img src="images/1.jpeg"></div>
<div class="slide"><img src="images/2.jpeg"></div>
<div class="slide"><img src="images/3.jpeg"></div>
<div class="slide"><img src="images/4.jpeg"></div>
<div class="slide"><img src="images/5.jpeg"></div>

</div>

<script>

const slides = document.querySelectorAll(".slide");
const slider = document.getElementById("slider");

let angle = 0;
let targetAngle = 0;

const total = slides.length;
const step = 360 / total;

/* 🔧 Ajuste dinámico profundidad */
function getZ(){
return window.innerWidth < 600 ? 180 : 350;
}

/* POSICIONAR EN CÍRCULO */
function positionSlides(){
const z = getZ();
slides.forEach((slide, i)=>{
slide.dataset.index = i;
slide.style.transform = `rotateY(${i * step}deg) translateZ(${z}px)`;
});
}

positionSlides();
window.addEventListener("resize", positionSlides);

/* CLICK → TRAER AL FRENTE */
slides.forEach((slide, i)=>{
slide.addEventListener("click", ()=>{
targetAngle = -i * step;
});
});

/* 🖱️ MOUSE + 📱 TOUCH */
let startX = 0;

document.addEventListener("mousemove", (e)=>{
const centerX = window.innerWidth / 2;
let diff = (e.clientX - centerX) / 50;
targetAngle += diff * 0.2;
});

/* TOUCH */
document.addEventListener("touchstart", (e)=>{
startX = e.touches[0].clientX;
});

document.addEventListener("touchmove", (e)=>{
let moveX = e.touches[0].clientX;
let diff = (moveX - startX) / 5;
targetAngle += diff * 0.05;
startX = moveX;
});

/* ANIMACIÓN SUAVE */
function animate(){
angle += (targetAngle - angle) * 0.05;
slider.style.transform = `perspective(1000px) rotateY(${angle}deg)`;
requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
