<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel 3D Interactivo</title>

<style>

body{
margin:0;
background:#000;
height:100vh;
overflow:hidden;
}

/* CONTENEDOR */
.slider{
position:absolute;
top:50%;
left:50%;
transform: translate(-50%, -50%) perspective(1000px);
transform-style: preserve-3d;

width:80vw;
height:50vh;
max-width:600px;
max-height:400px;
}

/* TARJETAS */
.slide{
position:absolute;
width:30vw;
height:40vh;
max-width:220px;
max-height:300px;

left:50%;
top:50%;
transform: translate(-50%, -50%);
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
cursor:pointer;
transition: transform 0.5s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* 📱 CELULAR */
@media (max-width:600px){

.slider{
width:100vw;
height:60vh;
}

.slide{
width:20vw;   /* 🔽 más pequeñas */
height:28vw;
}

}

</style>
</head>

<body>

<div class="slider" id="slider">

<div class="slide"><img src="images/1.jpeg"></div>
<div class="slide"><img src="images/2.jpeg"></div>
<div class="slide"><img src="images/3.jpeg"></div>
<div class="slide"><img src="images/4.jpeg"></div>
<div class="slide"><img src="images/5.jpeg"></div>

</div>

<script>

const slides = document.querySelectorAll(".slide");
const slider = document.getElementById("slider");

let angle = 0;
let targetAngle = 0;
let auto = true;

const total = slides.length;
const step = 360 / total;

/* 🔧 PROFUNDIDAD (más pegadas en móvil) */
function getZ(){
return window.innerWidth < 600 ? 200 : 350;
}

/* POSICIÓN */
function positionSlides(){
const z = getZ();
slides.forEach((slide, i)=>{
slide.style.transform = `
translate(-50%, -50%)
rotateY(${i * step}deg)
translateZ(${z}px)
`;
});
}

positionSlides();
window.addEventListener("resize", positionSlides);

/* CLICK */
slides.forEach((slide, i)=>{
slide.addEventListener("click", ()=>{
targetAngle = -i * step;
pauseAuto();
});
});

/* 🖱️ MOUSE */
document.addEventListener("mousemove", (e)=>{
if(!auto){
const centerX = window.innerWidth / 2;
let diff = (e.clientX - centerX) / 50;
targetAngle += diff * 0.2;
}
});

/* 📱 TOUCH */
let startX = 0;

document.addEventListener("touchstart", (e)=>{
startX = e.touches[0].clientX;
pauseAuto();
});

document.addEventListener("touchmove", (e)=>{
let moveX = e.touches[0].clientX;
let diff = (moveX - startX) / 5;
targetAngle += diff * 0.05;
startX = moveX;
});

/* ⏸️ PAUSA */
function pauseAuto(){
auto = false;
clearTimeout(window.resumeTimer);

window.resumeTimer = setTimeout(()=>{
auto = true;
}, 3000);
}

/* 🔄 GIRO AUTOMÁTICO */
function autoRotate(){
if(auto){
targetAngle += 0.03;
}
requestAnimationFrame(autoRotate);
}

autoRotate();

/* 🎯 ANIMACIÓN */
function animate(){
angle += (targetAngle - angle) * 0.05;
slider.style.transform = `
translate(-50%, -50%)
perspective(1000px)
rotateY(${angle}deg)
`;
requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
