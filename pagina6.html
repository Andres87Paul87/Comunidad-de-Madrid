<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{ box-sizing:border-box; }

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    font-family:'Segoe UI', sans-serif;
}

/* CARD */
.flip-card{
    width:90vw;
    height:90vh;
    max-width:300px;
    max-height:420px;
    perspective:1000px;
}

/* CONTENEDOR */
.flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.7s ease;
}

/* GIRO */
.flip-card.active .flip-inner{
    transform:rotateY(180deg);
}

/* CARAS */
.flip-front, .flip-back{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    border-radius:20px;
    backface-visibility:hidden;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* FRENTE */
.flip-front{
    background:black;
}

.flip-front img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXTO FRENTE */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    min-height:70px;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    text-align:center;
    padding:10px;
}

.role{
    font-size:14px;
    color:#38bdf8;
}

.name{
    font-size:16px;
    font-weight:bold;
    color:#fff;
}

/* ATRÁS */
.flip-back{
    background:#e0f2fe;
    color:#0f172a;
    transform:rotateY(180deg);
    display:flex;
    flex-direction:column;
    padding:15px;
}

/* CONTENIDO */
.flip-back-content{
    flex:1;
    overflow-y:auto;
}

/* TEXTO MÁS GRANDE */
.flip-back h3{
    text-align:center;
    font-size:18px;
    margin-bottom:10px;
}

.flip-back li{
    font-size:15px;
    margin-bottom:8px;
}

</style>
</head>

<body>

<div class="flip-card" onclick="flip(this)">
<div class="flip-inner">

<!-- FRENTE -->
<div class="flip-front">
<img src="images/Director.jpeg">
<div class="overlay">
<div class="role">DIRECTOR</div>
<div class="name">LUIS GERARDO TITUAÑA SÁNCHEZ</div>
</div>
</div>

<!-- ATRÁS -->
<div class="flip-back">
<h3>Formación Académica</h3>
<div class="flip-back-content">
<ul>
<li>Profesor de Educación Primaria – Nivel Tecnológico</li>
<li>Licenciado en Ciencias de la Educación</li>
<li>Licenciado en Pedagogía</li>
<li>Máster en Liderazgo Educativo</li>
<li>Máster en Docencia Universitaria</li>
</ul>
</div>
</div>

</div>
</div>

<script>
function flip(card){
    card.classList.toggle("active");
}
</script>

</body>
</html>
