<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.flip-card{
    width:300px;
    height:420px;
    perspective:1000px;
}

/* CONTENEDOR */
.flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:0.7s;
}

/* GIRO */
.flip-card:hover .flip-inner{
    transform:rotateY(180deg);
}

/* CARAS */
.flip-front, .flip-back{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    border-radius:20px;
    backface-visibility:hidden;
    overflow:hidden;
}

/* FRENTE */
.flip-front{
    background:#000;
}

.flip-front img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXTO */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    color:#fff;
    text-align:center;
    padding:10px;
}

/* ATRÁS */
.flip-back{
    background:#e0f2fe;
    transform:rotateY(180deg);
    padding:15px;
    overflow:auto;
}

/* TEXTO ATRÁS */
.flip-back h3{
    text-align:center;
    font-size:18px;
}

.flip-back li{
    font-size:15px;
    margin-bottom:8px;
}

</style>
</head>

<body>

<div class="flip-card">
<div class="flip-inner">

<!-- FRENTE -->
<div class="flip-front">
<img src="images/Director.jpeg">
<div class="overlay">
DIRECTOR<br>
LUIS GERARDO TITUAÑA SÁNCHEZ
</div>
</div>

<!-- ATRÁS -->
<div class="flip-back">
<h3>Formación Académica</h3>
<ul>
<li>Profesor de Educación Primaria</li>
<li>Licenciado en Ciencias de la Educación</li>
<li>Licenciado en Pedagogía</li>
<li>Máster en Liderazgo Educativo</li>
<li>Máster en Docencia Universitaria</li>
</ul>
</div>

</div>
</div>

</body>
</html>
