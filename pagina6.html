<style>

.flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transform-origin:center;
    transition:transform 0.8s;
}

/* CARAS */
.flip-front, .flip-back{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    border-radius:20px;
    backface-visibility:hidden;
}

/* 🔥 FIX CLAVE */
.flip-front{
    transform:translateZ(1px);
}

.flip-back{
    transform:rotateY(180deg) translateZ(1px);
}

</style>
