<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    font-family:'Segoe UI', sans-serif;
}

/* CARD */
.flip-card{
    width:90vw;
    height:90vh;
    max-width:300px;
    max-height:420px;
    perspective:1000px;
}

.flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.8s;
}

.flip-card.active .flip-inner{
    transform:rotateY(180deg);
}

.flip-front, .flip-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    backface-visibility:hidden;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* FRENTE */
.flip-front{
    position:relative;
    background:black;
}

/* IMAGEN COMPLETA */
.flip-front img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    min-height:70px;
    background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2));
    color:white;
    text-align:center;
    padding:10px;
    z-index:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* TEXTO */
.role{
    font-size:13px;
    color:#38bdf8;
}

.name{
    font-size:15px;
    font-weight:bold;
    color:#ffffff; /* 🔥 blanco */
    text-shadow: 0 2px 5px rgba(0,0,0,0.8); /* 🔥 mejora visibilidad */
}

/* ATRÁS */
.flip-back{
    background:#e0f2fe;
    color:#0f172a;
    transform:rotateY(180deg);
    padding:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.flip-back h3{
    text-align:center;
    margin-bottom:8px;
    font-size:15px;
}

.flip-back li{
    font-size:12px;
    margin-bottom:6px;
}

</style>
</head>

<body>

<div class="flip-card" onclick="flip(this)">
<div class="flip-inner">

<!-- FRENTE -->
<div class="flip-front">
<img src="images/Director.jpeg" alt="Director">

<div class="overlay">
<div class="role">DIRECTOR</div>
<div class="name">LUIS GERARDO TITUAÑA SÁNCHEZ</div>
</div>

</div>

<!-- ATRÁS -->
<div class="flip-back">
<h3>Formación Académica</h3>
<ul>
<li>Profesor de Educación Primaria</li>
<li>Licenciado en Ciencias de la Educación</li>
<li>Licenciado en Pedagogía</li>
<li>Máster en Liderazgo Educativo</li>
<li>Máster en Docencia Universitaria</li>
</ul>
</div>

</div>
</div>

<script>
function flip(card){
    card.classList.toggle("active");
}
</script>

</body>
</html>
